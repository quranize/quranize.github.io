name: Build and Deploy
on: [push]
permissions:
  contents: write
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Frontend 🛎️
        uses: actions/checkout@v3
        with:
          path: quranize.github.io

      - name: Checkout Engine 🛎️
        uses: actions/checkout@v3
        with:
          repository: alpancs/quranize-rs
          path: quranize-rs

      - name: Install Toolchain 🔧
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build 🔨
        run: |
          cd quranize-rs
          wasm-pack build --release --target=web --no-typescript
          cp -v pkg/quranize.js pkg/quranize_bg.wasm ../quranize.github.io/scripts

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: quranize.github.io
