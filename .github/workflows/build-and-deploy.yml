name: Build and Deploy
on: [push]
permissions:
  contents: write
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Frontend 🛎️
        uses: actions/checkout@v3

      - name: Checkout Engine 🛎️
        uses: actions/checkout@v3
        with:
          repository: alpancs/quranize-rs
          path: quranize-rs

      - name: Install Toolchain 🔧
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build 🔨
        run: |
          wasm-pack build --release --target=web --no-typescript quranize-rs
          cp -v quranize-rs/pkg/{quranize.js,quranize_bg.wasm} scripts
          rm -rf quranize-rs

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
